<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Training Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
  const SUPABASE_URL = "https://fddhckjikuudrrxlbnis.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_9uIpVX9FZJk16PGKZUYk6Q_uErqf5_G";

  const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  </script>

</head>
<body>

    <div class="login-box">
        <h2>Anmeldung</h2>

        <input id="email" type="text" placeholder="Benutzername">
        <input id="password" type="password" placeholder="Passwort">

        <button onclick="login()">Login</button>
    </div>

    <script>
    async function login() {
      const user = document.getElementById("email").value.trim();
      const pass = document.getElementById("password").value.trim();

      const { data, error } = await supabase.auth.signInWithPassword({
        email: user,
        password: pass
      });

      if (error) {
        alert("Login fehlgeschlagen");
        return;
      }

      window.location.href = "coach.html";
    }
    </script>

</body>
</html>
