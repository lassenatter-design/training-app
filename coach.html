<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trainingsbereich</title>
  <link rel="stylesheet" href="style.css">

  <!-- Supabase laden -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Supabase initialisieren -->
  <script>
    const SUPABASE_URL = "https://fddhckjikuudrrxlbnis.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_9uIpVX9FZJk16PGKZUYk6Q_uErqf5_G";

    const supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Login-Schutz
    async function protectPage() {
      const { data } = await supa.auth.getUser();
      if (!data.user) {
        window.location.href = "index.html";
      }
    }
    protectPage();
  </script>
</head>

<body class="apple-body">

  <header class="apple-header">
    <h1>Trainingsbereich</h1>
  <div id="coachAthleteButtons" class="athlete-buttons">
  <button class="athlete-btn" data-athlete="Lasse">Lasse</button>
  <button class="athlete-btn" data-athlete="Tora">Tora</button>
  <button class="athlete-btn" data-athlete="Kerstin">Kerstin</button>
  </div>


    <button onclick="logout()" class="logout-btn">Logout</button>

    <script>
      async function logout() {
        await supa.auth.signOut();
        window.location.href = "index.html";
      }
    </script>
  </header>

  <main class="apple-main">
    <section class="apple-card">
      <h2>Monatskalender</h2>

      <button id="importExcel" class="import-btn">Excel importieren</button>
      <button id="importDocs" class="import-btn">Word-Dateien importieren</button>

      <div class="calendar-header">
        <button class="month-btn" id="prevMonth">‹</button>
        <h2 id="monthName">Monat</h2>
        <button class="month-btn" id="nextMonth">›</button>
      </div>

      <div id="calendarGrid" class="calendar-grid"></div>
    </section>
  </main>

  <!-- XLSX -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <!-- Hauptscript (DEINE große Datei) -->
  <script src="script.js"></script>

</body>
</html>
