<!DOCTYPE html>

  <!-- Supabase initialisieren -->
  <script>
    const SUPABASE_URL = "https://fddhckjikuudrrxlbnis.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_9uIpVX9FZJk16PGKZUYk6Q_uErqf5_G";

    const supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

<body class="apple-body">

  <header class="apple-header">
    <h1>Trainingsbereich</h1>
  <div id="coachAthleteButtons" class="athlete-buttons">
 <button class="athlete-btn" onclick="openCoachAnalysis('Lasse')">
  <div class="athlete-btn-icon">🏊‍♂️</div>
  Lasse
</button>

<button class="athlete-btn" onclick="openCoachAnalysis('Tora')">
  <div class="athlete-btn-icon">🚴‍♀️</div>
  Tora
</button>

<button class="athlete-btn" onclick="openCoachAnalysis('Kerstin')">
  <div class="athlete-btn-icon">🏃‍♀️</div>
  Kerstin
</button>

<div id="coachAnalysis" class="coach-analysis hidden">
  <div class="coach-analysis-header">
    <h1 id="coachAnalysisTitle"></h1>
    <button id="coachAnalysisClose" class="close-btn">×</button>
  </div>

  <div id="coachAnalysisContent"></div>

  <h2>Trainings</h2>
  <div id="coachTrainingList"></div>

  <h2>Training Details</h2>
  <div id="coachTrainingDetail"></div>

  <h2>Diagramme</h2>
  <canvas id="coachChart" height="120"></canvas>
  <h2>Trainings</h2>
<div id="coachTrainingList"></div>

<h2>Training Details</h2>
<div id="coachTrainingDetail"></div>

<h2>Diagramme</h2>
<canvas id="coachChart" height="120"></canvas>

</div>




    
  </header>
  <button class="logout-btn" onclick="logout()">🚪 Logout</button>


    <script>
      async function logout() {
        await supa.auth.signOut();
        window.location.href = "index.html";
      }
    </script>

  <main class="apple-main">
    <section class="apple-card">
      <h2>Monatskalender</h2>

      <button class="coach-only" id="excelImportBtn">Excel importieren</button>
<input type="file" id="excelFileInput" accept=".xlsx, .xls" style="display:none;">

<button class="coach-only" id="importDocs">Word-Dateien importieren</button>
<button class="coach-only" id="deleteAthleteBtn">Athlet löschen</button>




      <div class="calendar-header">
        <button class="month-btn" id="prevMonth">‹</button>
        <h2 id="monthName">Monat</h2>
        <button class="month-btn" id="nextMonth">›</button>
      </div>

      <div id="calendarGrid" class="calendar-grid"></div>
    </section>
    <div class="coach-only" id="createUserBox" style="margin-top:20px;">
  <h3>Neuen Athleten anlegen</h3>

  <label>Email:</label>
  <input id="newUserEmail" type="email">

  <label>Passwort:</label>
  <input id="newUserPassword" type="password">

  <label>Trainingsplan übernehmen von:</label>
  <select id="newUserSource">
    <option value="Lasse">Lasse</option>
    <option value="Tora">Tora</option>
    <option value="Kerstin">Kerstin</option>
  </select>

  <label>Neuer Athletenname:</label>
  <input id="newUserAthleteName" type="text" placeholder="z.B. Julia, Jochen">

  <button id="createUserSubmit">Athlet erstellen</button>
</div>


  </main>
